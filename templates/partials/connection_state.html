<div id="connection-state"
     class="{% if snapshot.connected %}connected{% else %}disconnected{% endif %}"
     role="status" aria-live="polite"
     sse-swap="state" hx-swap="outerHTML">
  {% if !snapshot.connected %}
  <span class="dot"></span>
  <span>Disconnected - reconnecting...</span>
  {% endif %}
</div>
